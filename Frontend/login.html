<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SwiftRail</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-train-subway"></i> SwiftRail
            </a>
            <nav>
                <ul id="nav-links">
                    <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="trains.html"><i class="fa-solid fa-magnifying-glass"></i> Search Trains</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div class="glass-card" style="width: 100%; max-width: 450px;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-user-lock" style="font-size: 3rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                <h2 style="margin-top: 1rem;">Passenger Login</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Access your booking dashboard and travel history</p>
            </div>

            <div id="login-error" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); padding: 0.75rem 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.9rem; display: none;">
                <!-- Error text injected here -->
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="login-password"><i class="fa-solid fa-key"></i> Password</label>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="width: 100%; padding: 0.9rem;"><i class="fa-solid fa-right-to-bracket"></i> Login Account</button>
            </form>

            <div class="form-footer">
                Don't have a passenger account? <a href="register.html" style="font-weight: 600;">Register here</a>
            </div>
            
            <div style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted);">
                Testing: Admin email is <strong>admin@railway.com</strong>, password is <strong>admin123</strong>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="logo">
                <i class="fa-solid fa-train-subway"></i> SwiftRail
            </div>
            <p style="color: var(--text-muted);">&copy; 2026 SwiftRail Corporation. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
