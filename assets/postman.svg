<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    .bg { fill: #1c1c1c; }
    .header { fill: #2b2b2b; }
    .sidebar { fill: #252525; }
    .panel { fill: #2d2d2d; }
    .text-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #a6a6a6; }
    .text-main { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #e3e3e3; }
    .text-accent { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #ff6c37; font-weight: bold; }
    .text-green { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #0ec87b; font-weight: bold; }
    .text-json { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #a78bfa; }
    .grid-line { stroke: #3d3d3d; stroke-width: 1; }
    .border { stroke: #3a3a3a; stroke-width: 1; fill: none; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="8" class="bg"/>

  <!-- OS Header bar -->
  <rect width="800" height="35" rx="8" class="header"/>
  <circle cx="20" cy="17" r="6" fill="#ef4444"/>
  <circle cx="40" cy="17" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="17" r="6" fill="#10b981"/>
  <text x="400" y="22" text-anchor="middle" class="text-title" font-weight="bold">Postman - Railway Reservation API</text>

  <!-- Sidebar -->
  <rect x="0" y="35" width="180" height="415" class="sidebar"/>
  <text x="15" y="65" class="text-title" font-weight="bold">MY WORKSPACE</text>
  <text x="20" y="100" class="text-main">📁 Passengers API</text>
  <text x="35" y="125" class="text-green" font-size="11">GET <tspan fill="#e3e3e3">List Passengers</tspan></text>
  <text x="35" y="150" class="text-accent" font-size="11">POST <tspan fill="#e3e3e3">Add Passenger</tspan></text>
  <text x="20" y="185" class="text-main">📁 Trains API</text>
  <text x="35" y="210" class="text-green" font-size="11">GET <tspan fill="#e3e3e3">List Trains</tspan></text>
  <text x="20" y="245" class="text-main">📁 Booking API</text>
  <text x="35" y="270" class="text-green" font-size="11">GET <tspan fill="#e3e3e3">List Bookings</tspan></text>

  <!-- Request Panel -->
  <rect x="180" y="35" width="620" height="90" class="panel"/>
  
  <!-- Address bar -->
  <rect x="195" y="50" width="70" height="30" rx="4" fill="#0cbb70"/>
  <text x="230" y="70" text-anchor="middle" class="text-main" font-weight="bold" fill="#fff">GET</text>
  
  <rect x="270" y="50" width="420" height="30" rx="4" fill="#202020"/>
  <text x="285" y="70" class="text-main">http://127.0.0.1:8000/passengers/</text>
  
  <rect x="700" y="50" width="80" height="30" rx="4" fill="#ff6c37"/>
  <text x="740" y="70" text-anchor="middle" class="text-main" font-weight="bold" fill="#fff">Send</text>

  <!-- Params tabs -->
  <text x="200" y="110" class="text-accent">Params</text>
  <text x="260" y="110" class="text-title">Headers (4)</text>
  <text x="340" y="110" class="text-title">Body</text>
  <text x="390" y="110" class="text-title">Settings</text>

  <!-- Response Section Header -->
  <rect x="180" y="125" width="620" height="40" fill="#222"/>
  <text x="200" y="150" class="text-title" font-weight="bold">Response</text>
  <text x="640" y="150" class="text-title">Status: <tspan class="text-green">200 OK</tspan></text>
  <text x="730" y="150" class="text-title">Time: <tspan fill="#e3e3e3">12 ms</tspan></text>

  <!-- Response Body -->
  <text x="200" y="195" class="text-json">[</text>
  <text x="220" y="215" class="text-json">  {</text>
  <text x="240" y="235" class="text-json">    <tspan fill="#60a5fa">"passenger_id"</tspan>: <tspan fill="#f59e0b">101</tspan>,</text>
  <text x="240" y="255" class="text-json">    <tspan fill="#60a5fa">"full_name"</tspan>: <tspan fill="#34d399">"Rahul Sharma"</tspan>,</text>
  <text x="240" y="275" class="text-json">    <tspan fill="#60a5fa">"email"</tspan>: <tspan fill="#34d399">"rahul@gmail.com"</tspan>,</text>
  <text x="240" y="295" class="text-json">    <tspan fill="#60a5fa">"phone"</tspan>: <tspan fill="#34d399">"9876543210"</tspan>,</text>
  <text x="240" y="315" class="text-json">    <tspan fill="#60a5fa">"gender"</tspan>: <tspan fill="#34d399">"Male"</tspan>,</text>
  <text x="240" y="335" class="text-json">    <tspan fill="#60a5fa">"age"</tspan>: <tspan fill="#f59e0b">28</tspan>,</text>
  <text x="240" y="355" class="text-json">    <tspan fill="#60a5fa">"address"</tspan>: <tspan fill="#34d399">"Hyderabad"</tspan></text>
  <text x="220" y="375" class="text-json">  }</text>
  <text x="200" y="395" class="text-json">]</text>

  <!-- Outer Window Border -->
  <rect width="800" height="450" rx="8" class="border"/>
</svg>
