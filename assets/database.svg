<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Styles -->
  <style>
    .bg { fill: #0b0f19; }
    .window-header { fill: #111827; }
    .sidebar { fill: #1f2937; }
    .text-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #9ca3af; }
    .text-main { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #f3f4f6; }
    .text-muted { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #6b7280; font-weight: bold; }
    .text-accent { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #6366f1; font-weight: bold; }
    .grid-line { stroke: #374151; stroke-width: 1; }
    .header-line { stroke: #4b5563; stroke-width: 1.5; }
    .border { stroke: #374151; stroke-width: 1; fill: none; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="8" class="bg"/>

  <!-- Window Header -->
  <rect width="800" height="35" rx="8" class="window-header"/>
  <!-- OS buttons -->
  <circle cx="20" cy="17" r="6" fill="#ef4444"/>
  <circle cx="40" cy="17" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="17" r="6" fill="#10b981"/>
  <text x="400" y="22" text-anchor="middle" class="text-title" font-weight="bold">SQLite DB Browser - db.sqlite3</text>

  <!-- Sidebar -->
  <rect x="0" y="35" width="200" height="415" class="sidebar"/>
  <text x="15" y="65" class="text-muted">DATABASES</text>
  <text x="30" y="90" class="text-main">📁 db.sqlite3</text>
  <text x="45" y="115" class="text-muted">TABLES</text>
  <text x="60" y="140" class="text-accent">🔑 Backend_passenger</text>
  <text x="60" y="165" class="text-main">🖧 Backend_train</text>
  <text x="60" y="190" class="text-main">🖧 Backend_schedule</text>
  <text x="60" y="215" class="text-main">🖧 Backend_booking</text>
  <text x="60" y="240" class="text-main">🖧 Backend_payment</text>

  <!-- Main View -->
  <!-- Toolbar -->
  <rect x="200" y="35" width="600" height="40" fill="#111827"/>
  <text x="220" y="60" class="text-main" font-weight="bold">Table: Backend_passenger</text>
  <rect x="680" y="42" width="100" height="25" rx="4" fill="#6366f1"/>
  <text x="730" y="58" text-anchor="middle" class="text-main" font-weight="bold" fill="#fff" font-size="11">Browse Data</text>

  <!-- Table Grid -->
  <!-- Headers -->
  <text x="220" y="105" class="text-muted">passenger_id</text>
  <text x="320" y="105" class="text-muted">full_name</text>
  <text x="480" y="105" class="text-muted">email</text>
  <text x="630" y="105" class="text-muted">phone</text>
  <text x="730" y="105" class="text-muted">age</text>
  <line x1="200" y1="115" x2="800" y2="115" class="header-line"/>

  <!-- Row 1 -->
  <text x="220" y="145" class="text-main" fill="#a5b4fc">100</text>
  <text x="320" y="145" class="text-main">System Administrator</text>
  <text x="480" y="145" class="text-main">admin@railway.com</text>
  <text x="630" y="145" class="text-main">9999999999</text>
  <text x="730" y="145" class="text-main">35</text>
  <line x1="200" y1="160" x2="800" y2="160" class="grid-line"/>

  <!-- Row 2 -->
  <text x="220" y="190" class="text-main" fill="#a5b4fc">101</text>
  <text x="320" y="190" class="text-main">Rahul Sharma</text>
  <text x="480" y="190" class="text-main">rahul@gmail.com</text>
  <text x="630" y="190" class="text-main">9876543210</text>
  <text x="730" y="190" class="text-main">28</text>
  <line x1="200" y1="205" x2="800" y2="205" class="grid-line"/>

  <!-- Border lines -->
  <line x1="305" y1="80" x2="305" y2="450" class="grid-line"/>
  <line x1="465" y1="80" x2="465" y2="450" class="grid-line"/>
  <line x1="615" y1="80" x2="615" y2="450" class="grid-line"/>
  <line x1="715" y1="80" x2="715" y2="450" class="grid-line"/>

  <!-- Footer/Status -->
  <rect x="200" y="425" width="600" height="25" fill="#111827"/>
  <text x="215" y="442" class="text-title" font-size="11">Showing rows 1 - 2 of 2 | SQLite 3.x</text>

  <!-- Outer Window Border -->
  <rect width="800" height="450" rx="8" class="border"/>
</svg>
